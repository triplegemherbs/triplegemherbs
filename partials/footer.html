  <script>
    // Obfuscate emails
    document.getElementById('email-obfuscated').innerHTML = '<a href="mailto:jasmine@triplegemherbs.com">jasmine@triplegemherbs.com</a>';
    document.getElementById('business-email-obfuscated').innerHTML = '<a href="mailto:triplegemherbs@gmail.com">triplegemherbs@gmail.com</a>';

    // Handle form submission
    document.getElementById('newsletter-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const messageDiv = document.getElementById('form-message');

      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          messageDiv.innerHTML = '<p style="color: var(--accent);">Thanks for subscribing! Check your email for confirmation.</p>';
          messageDiv.style.display = 'block';
          form.reset();
        } else {
          messageDiv.innerHTML = '<p style="color: red;">Oops! Something went wrong. Please try again.</p>';
          messageDiv.style.display = 'block';
        }
      }).catch(error => {
        messageDiv.innerHTML = '<p style="color: red;">Network error. Please try again later.</p>';
        messageDiv.style.display = 'block';
      });
    });

    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
